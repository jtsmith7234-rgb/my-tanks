<!doctype html>
<html lang="en" data-theme="tropical-pop" data-skin="light">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ecfbff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tank Care Buddy" />
  <title>Tank Care Buddy</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css?v=20260607f" />
  <script>
    /* Apply saved theme as early as possible so the very first paint is correct.
       Maps legacy values (aquarium) and any removed theme onto the current set. */
    try {
      var SKIN = { "midnight-reef":"dark", "tropical-pop":"light", "planted":"light" };
      var LEGACY = { aquarium:"midnight-reef" };
      var t = localStorage.getItem("tm.theme.v1");
      if (LEGACY[t]) t = LEGACY[t];
      if (!SKIN[t]) t = "tropical-pop";
      var r = document.documentElement;
      r.dataset.theme = t;
      r.dataset.skin = SKIN[t];
    } catch(e){}
  </script>
</head>
<body>
  <div class="petals" aria-hidden="true">
    <!-- Rising motes: shown only by The Deep + Tropical Pop -->
    <span class="petal"    style="left:8%;  animation-duration:14s; animation-delay:0s"></span>
    <span class="petal p2" style="left:22%; animation-duration:18s; animation-delay:-4s"></span>
    <span class="petal p3" style="left:38%; animation-duration:22s; animation-delay:-12s"></span>
    <span class="petal"    style="left:55%; animation-duration:16s; animation-delay:-6s"></span>
    <span class="petal p2" style="left:70%; animation-duration:20s; animation-delay:-10s"></span>
    <span class="petal"    style="left:84%; animation-duration:15s; animation-delay:-2s"></span>
    <span class="petal p3" style="left:93%; animation-duration:24s; animation-delay:-16s"></span>
    <!-- Planted: broad-leaf freshwater plants (Amazon sword / Cryptocoryne
         style) in loose rooted clumps, nodding slowly with the current.
         --bw = leaf width, --bh = leaf+stem height. Shown only by the
         planted theme. -->
    <div class="fx-plants">
      <!-- left clump -->
      <span class="blade" style="left:3%;  --bw:54px; --bh:50vh; --bo:.80; --sd:12s;  --del:0s"></span>
      <span class="blade" style="left:9%;  --bw:42px; --bh:42vh; --bo:.70; --sd:10s;  --del:-3s"></span>
      <span class="blade" style="left:14%; --bw:62px; --bh:56vh; --bo:.86; --sd:13.5s;--del:-6s"></span>
      <span class="blade" style="left:19%; --bw:38px; --bh:36vh; --bo:.64; --sd:9.5s; --del:-1s"></span>
      <!-- mid clump -->
      <span class="blade" style="left:38%; --bw:50px; --bh:46vh; --bo:.78; --sd:11.5s;--del:-4s"></span>
      <span class="blade" style="left:44%; --bw:44px; --bh:40vh; --bo:.70; --sd:13s;  --del:-7s"></span>
      <span class="blade" style="left:50%; --bw:64px; --bh:58vh; --bo:.88; --sd:14.5s;--del:-2s"></span>
      <span class="blade" style="left:56%; --bw:40px; --bh:38vh; --bo:.66; --sd:9s;   --del:-3s"></span>
      <!-- right clump -->
      <span class="blade" style="left:80%; --bw:60px; --bh:54vh; --bo:.86; --sd:13s;  --del:-6s"></span>
      <span class="blade" style="left:86%; --bw:44px; --bh:44vh; --bo:.72; --sd:11s;  --del:-2s"></span>
      <span class="blade" style="left:92%; --bw:52px; --bh:50vh; --bo:.80; --sd:14s;  --del:-9s"></span>
      <span class="blade" style="left:97%; --bw:38px; --bh:34vh; --bo:.62; --sd:10s;  --del:-4s"></span>
    </div>
  </div>
  <div id="app">
    <header class="topbar">
      <div class="topbar-side topbar-left">
        <button id="back-btn" class="ghost-btn ghost-btn-lg" hidden>&larr;</button>
        <button id="settings-btn" class="ghost-btn ghost-btn-lg" title="Settings" aria-label="Settings">⚙</button>
      </div>
      <h1 id="title">Tank Care Buddy</h1>
      <div class="topbar-side topbar-right">
        <button id="browse-species-btn" class="ghost-btn ghost-btn-lg" title="Browse species" aria-label="Browse species">🐟</button>
        <button id="add-tank-btn" class="ghost-btn ghost-btn-lg" title="Add tank" aria-label="Add tank">+</button>
      </div>
    </header>

    <div id="storage-banner" hidden></div>

    <main id="main"></main>

    <input type="file" id="import-file" accept="application/json,.json" hidden />

    <footer class="footer">
      <span>Tap a tank to open it. Calculator dosing uses new-water volume.</span>
    </footer>
  </div>

  <script src="data.js?v=20260530f"></script>
  <script src="cloud.js?v=20260530f"></script>
  <script src="advisor.js?v=20260605d"></script>
  <script src="reminders.js?v=20260605f"></script>
  <script src="graphs.js?v=20260530f"></script>
  <script src="fishdb.js?v=20260607f"></script>
  <script src="chemicals.js?v=20260530f"></script>
  <script src="firsttank.js?v=20260606a"></script>
  <script src="tutorial.js?v=20260607a"></script>
  <script src="app.js?v=20260607d"></script>
</body>
</html>

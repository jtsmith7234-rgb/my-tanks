<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Tanks" />
  <title>My Tanks</title>
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="petals" aria-hidden="true">
    <span class="petal"    style="left:8%;  animation-duration:14s; animation-delay:0s"></span>
    <span class="petal p2" style="left:22%; animation-duration:18s; animation-delay:-4s"></span>
    <span class="petal p3" style="left:38%; animation-duration:22s; animation-delay:-12s"></span>
    <span class="petal"    style="left:55%; animation-duration:16s; animation-delay:-6s"></span>
    <span class="petal p2" style="left:70%; animation-duration:20s; animation-delay:-10s"></span>
    <span class="petal"    style="left:84%; animation-duration:15s; animation-delay:-2s"></span>
    <span class="petal p3" style="left:93%; animation-duration:24s; animation-delay:-16s"></span>
  </div>
  <div id="app">
    <header class="topbar">
      <button id="back-btn" class="ghost-btn" hidden>&larr;</button>
      <h1 id="title">My Tanks</h1>
      <button id="backup-btn" class="ghost-btn" title="Backup">⤓</button>
      <button id="add-tank-btn" class="ghost-btn" title="Add tank">+</button>
    </header>

    <div id="storage-banner" hidden></div>

    <main id="main"></main>

    <input type="file" id="import-file" accept="application/json,.json" hidden />

    <footer class="footer">
      <span>Tap a tank to open it. Calculator dosing uses new-water volume.</span>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="cloud.js"></script>
  <script src="app.js"></script>
</body>
</html>

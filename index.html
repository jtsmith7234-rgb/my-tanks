<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1e2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Tanks" />
  <title>My Tanks</title>
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="back-btn" class="ghost-btn" hidden>&larr;</button>
      <h1 id="title">My Tanks</h1>
      <button id="backup-btn" class="ghost-btn" title="Backup">⤓</button>
      <button id="add-tank-btn" class="ghost-btn" title="Add tank">+</button>
    </header>

    <div id="storage-banner" hidden></div>

    <main id="main"></main>

    <input type="file" id="import-file" accept="application/json,.json" hidden />

    <footer class="footer">
      <span>Tap a tank to open it. Calculator dosing uses new-water volume.</span>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="cloud.js"></script>
  <script src="app.js"></script>
</body>
</html>
